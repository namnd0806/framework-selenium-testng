# ============================================================
# Default Configuration — Selenium Test Framework
# ============================================================
# Override any value via:
#   System property:      -Dbase.url=https://example.com
#   Environment variable: BASE_URL=https://example.com
# ============================================================

# Target application URL (required)
base.url=http://localhost:8080

# Browser to use: chrome | firefox | edge | safari
browser=chrome

# Run browser in headless mode (no GUI)
headless=false

# Implicit wait timeout in seconds (0 = disabled, recommended)
implicit.wait.timeout=0

# Explicit wait timeout in seconds
explicit.wait.timeout=10

# Number of parallel threads for TestNG suite execution
thread.count=1

# Capture screenshot on test failure and attach to Allure report
screenshot.on.failure=true

# Number of times to retry a failed test (technical failures only)
retry.count=1

# Active environment profile: dev | staging | production
env=dev

# Set to true when running inside a CI pipeline (enables headless automatically)
ci.mode=false

# ============================================================
# Page URLs — override per environment in config-{env}.properties
# ============================================================
page.url.login=http://localhost:8080/login
